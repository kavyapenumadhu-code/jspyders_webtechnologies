<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="8" width="700">
    
    <tr>
        <th colspan="2">Registration Form</th>
    </tr>

    <tr>
        <td>Student</td>
        <td><input type="text" size="50"></td>
    </tr>

    <tr>
        <td>Father's Name</td>
        <td><input type="text" size="50"></td>
    </tr>

    <tr>
        <td>Mother's Name</td>
        <td><input type="text" size="50"></td>
    </tr>

    <tr>
        <td>Date of Birth</td>
        <td><input type="date"></td>
    </tr>

    <tr>
        <td>Gender</td>
        <td>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </td>
    </tr>

    <tr>
        <td>Email ID</td>
        <td><input type="email" size="50"></td>
    </tr>

    <tr>
        <td>Mobile No</td>
        <td><input type="tel" size="50"></td>
    </tr>

    <tr>
        <td>Address</td>
        <td>
            <textarea rows="12" cols="50"></textarea>
        </td>
    </tr>

    <tr>
        <td>State</td>
        <td><input type="text" size="50"></td>
    </tr>

    <tr>
        <td>City</td>
        <td><input type="text" size="50"></td>
    </tr>

    <tr>
        <td></td>
        <td>
            <input type="submit" value="submit">
        </td>
    </tr>
 
</body>
</html>
