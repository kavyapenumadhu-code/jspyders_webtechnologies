<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>

<tr>
    <td>Full Name</td>
    <td><input type="text" maxlength="20"></td>
    <!-- <td>(max 20 char a-z and A-Z)</td> -->
</tr>

<tr>
    <td>Last Name</td>
    <td><input type="text" maxlength="20"></td>
    <!-- <td>(max 20 char a-z and A-Z)</td> -->
</tr>

<tr>
    <td>Date of Birth</td>
    <td><input type="date"></td>
</tr>

<tr>
    <td>Gender</td>
    <td>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </td>
</tr>

<tr>
    <td>Email ID</td>
    <td><input type="email"></td>
</tr>

<tr>
    <td>Mobile No</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Address</td>
    <td><textarea rows="8" cols="30"></textarea></td>
</tr>

<tr>
    <td>City</td>
    <td><input type="text" maxlength="20"></td>
    <!-- <td>(max 20 char a-z and A-Z)</td> -->
</tr>

<tr>
    <td>PIN Code</td>
    <td><input type="text" maxlength="6"></td>
    <!-- <td>(6 digit number)</td> -->
</tr>

<tr>
    <td>State</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Country</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Hobbies</td>
    <td>
        <input type="checkbox"> Drawing
        <input type="checkbox"> Singing
        <input type="checkbox"> Dancing
        <br>
        <input type="checkbox"> Others
        <input type="text">
    </td>
</tr>

<tr>
    <td>Qualification</td>
    <td colspan="3">
        <table border="1">
            <tr>
                <th>Sl.No</th>
                <th>Examination</th>
                <th>Board</th>
                <th>Percentage</th>
                <th>Year of Passing</th>
            </tr>

            <tr>
                <td>01</td>
                <td>Class X</td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>02</td>
                <td>Class XII</td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>03</td>
                <td>Graduation</td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>04</td>
                <td>Master</td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
            </tr>
        </table>
    </td>
</tr>

<tr>
    <td>Courses Applied For</td>
    <td colspan="2">
        <input type="checkbox"> BSC
        <input type="checkbox"> B.Com
        <input type="checkbox"> B.Sc
        <input type="checkbox"> B.A
    </td>
</tr>

<tr>
    <td><input type="submit" value="Submit"></td>
    <td><input type="reset" value="Reset"></td>
</tr>

</table>
</body>
</html>
