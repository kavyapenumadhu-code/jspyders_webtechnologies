<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .c1{
            background-color: red;
        }
        .c2{
            background-color: orange;
        }
        .c3{
            background-color: green;
        }
        .c4{
            color: red;
        }
        .c5{
            color: green;
        }
    </style>
</head>
<body>
    <!-- lists -->
     <ol type="A" start="2">
        <li>Background-color
            <ul type="circle">
                <li class="c1">Red</li>
                <li class="c3">Green</li>
                <li>Background-color 1.1
                    <ol type="A" start="4">
                        <li class="c1">Crimson</li>
                        <li class="c2">Orange</li>
                        <li class="c3">Green</li>
                    </ol>
                </li>
            </ul>
        </li>
        <li>Color
            <ol>
                <li>Color 1.1
                    <ol start="100">
                        <li class="c4">Red</li>
                        <li class="c5">Green</li>
                        <li>Note</li>
                    </ol>
                </li>
            </ol>
        </li>
     </ol>
</body>
</html>
