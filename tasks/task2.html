<!DOCTYPE html>
<html>
<head>
    <title>Box Layout</title>
</head>
<body>

<table border="1" cellspacing="5" cellpadding="5">

    <tr>
        <td bgcolor="orange">
            <table border="1" cellpadding="20">
                <tr><td colspan="5"></td></tr>
                <tr>
                    <td rowspan="2"></td>
                    <td></td>
                    <td rowspan="2"></td>
                    <td rowspan="2"></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td><td></td><td></td><td></td><td></td>
                </tr>
            </table>
        </td>

        <td bgcolor="pink">
            <table border="1" cellpadding="20">
                <tr>
                    <td rowspan="2"></td>
                    <td></td>
                    <td rowspan="2"></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td colspan="4"></td>
                </tr>
                <tr>
                    <td></td>
                    <td rowspan="2"></td>
                    <td></td>
                    <td rowspan="2"></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                </tr>
            </table>
        </td>
    </tr>

    <tr>
        <td bgcolor="lightblue">
            <table border="1" cellpadding="20">
                <tr>
                    <td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                    <td></td>
                    <td rowspan="2" colspan="2"></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td><td></td><td></td><td></td>
                </tr>
            </table>
        </td>

        <td bgcolor="lightgreen">
            <table border="1" cellpadding="20">
                <tr>
                    <td rowspan="4"></td>
                    <td></td>
                    <td rowspan="4"></td>
                    <td></td>
                </tr>
                <tr><td></td><td></td></tr>
                <tr><td></td><td></td></tr>
                <tr><td></td><td></td></tr>
            </table>
        </td>
    </tr>

    <tr>
        <td bgcolor="yellow">
            <table border="1" cellpadding="25">
                <tr>
                    <td></td><td></td><td></td>
                </tr>
                <tr>
                    <td></td><td></td><td></td>
                </tr>
                <tr>
                    <td></td><td></td><td></td>
                </tr>
            </table>
        </td>

        <td bgcolor="lavender">
            <table border="1" cellpadding="25">
                <tr>
                    <td rowspan="3"></td>
                    <td colspan="2"></td>
                </tr>
                <tr>
                    <td></td>
                    <td rowspan="2"></td>
                </tr>
                <tr>
                    <td></td>
                </tr>
            </table>
        </td>
    </tr>

    <tr>
        <td bgcolor="#dff0d8">
            <table border="1" cellpadding="25">
                <tr>
                    <td></td>
                    <td rowspan="3" colspan="2"></td>
                </tr>
                <tr>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                </tr>
            </table>
        </td>

        <td bgcolor="deeppink">
            <table border="1" cellpadding="25">
                <tr>
                    <td rowspan="2"></td>
                    <td rowspan="2"></td>
                    <td rowspan="2"></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                </tr>
                <tr>
                    <td colspan="4"></td>
                </tr>
            </table>
        </td>
    </tr>

</table>

</body>
</html>
