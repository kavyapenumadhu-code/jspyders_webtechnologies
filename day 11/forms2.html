<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <!-- text -->
      <label for="student_name">Name</label>
      <input type="text" id="student_name" name="Name" /><br /><br />
      <!--password  -->
      <label for="pass">Password</label>
      <input type="password" id="pass" name="Password" /><br /><br />
      <!-- email -->
      <label for="email">Email Id</label>
      <input type="email" id="email" name="Email Id" /><br /><br />
      <!-- number -->
      <label for="age">Age</label>
      <input type="number" id="age" name="Age" /><br /><br />
      <!-- tel -->
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="Phone" /><br /><br />
      <!-- color -->
      <label for="fav-color">Favourite color</label>
      <input type="color" id="fav-color" name="fav-color" /><br /><br />
      <!-- range -->
      <label for="fav-num">Favourite Number</label>
      <input type="range" name="fav-num" id="fav-num" /><br /><br />
      <!-- url -->
      <label for="linkedin">Linkedin</label>
      <input type="url" id="linkedin" name="linkedin" /><br /><br />
      <!-- date -->
      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob" /><br /><br />
      <!-- time -->
      <label for="curr-time">Current-Time</label>
      <input type="time" id="curr-time" name="curr-time" /><br><br>
      <!-- date-time-local -->
      <label for="curr-date-time">Date-Time-Local</label>
      <input type="datetime-local" id="curr-date-time" name="curr-date-time" /><br><br>
      <!-- file -->
       <label for="resume">Resume</label>
       <input type="file" id="resume" name="resume"><br><br>
      <!-- button -->
       <input type="button">
       <!-- image -->
        
      <!-- submit -->
      <button><input type="submit" /></button><br><br>
      <!-- reset -->
      <button><input type="reset" /></button><br><br>
    </form>
  </body>
</html>
