<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .c1{
            border: 2px solid;
        }
    </style>
</head>
<body>
    <div class="c1">hello</div>
    <div class="c1">Html</div>

    <span style="background-color: aqua;">HTML</span>
    <span style="background-color: red;">CSS</span>
    <span style="background-color: yellow;">JAVA SCRIPT</span>

    <!-- nested div -->
     <div style="border: 2px solid;">
        hi
        hello
        <div style="background-color: aqua;">HYPER TEXT</div>
        <div style="background-color: yellow;">Markup Language</div>
        bye bye
        tata
     </div>
    <!-- nested span -->
     <span>
        HI
        TATA
        <span style="background-color: aqua;">HI</span>
        <span style="background-color: burlywood;">Hello</span>
        <span style="background-color: hotpink;">HOW ARE YOU</span>
     </span><br><br>
     <!-- span inside>div -->
      <div style="border: 2px solid">
        <span style="background-color: aqua;">hi</span>
        <span style="background-color: yellow;">hello</span>
        <!-- <div>hello div</div> -->
      </div><br>
    <!-- div inside span-->
     <span>
        <div>hi</div>
        <div>hello</div>
        <div>html</div>
     </span>
</body>
</html>
